name: Auto-enable auto-merge for claude/** PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    # Only run for claude/** branches from the same repo (not forks)
    if: >-
      startsWith(github.event.pull_request.head.ref, 'claude/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "Enabling auto-merge (squash) on PR #${{ github.event.pull_request.number }}"
          gh pr merge "$PR_URL" --auto --squash || {
            echo "::warning::Squash merge failed — falling back to regular merge"
            gh pr merge "$PR_URL" --auto --merge
          }
